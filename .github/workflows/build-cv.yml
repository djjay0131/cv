name: build-cv

on:
  push:
    branches: [master]
    paths-ignore:
      - "llm/**"
      - "**/*.md"
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write   # needed to update the "latest" release.

jobs:
  tests:
    name: Python tests & lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint bibliography
        run: python -m tools.lint_bib own-bib.bib

      - name: Run test suite
        run: pytest

      - name: Ruff check
        run: ruff check .

  build:
    name: Render + compile PDF + publish artifacts
    needs: tests
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jinja2 pydantic bibtexparser

      - name: Render LaTeX fragments
        run: python -m tools.render academic

      - name: Compile PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv-llt.tex
          latexmk_use_xelatex: true
          args: "-interaction=nonstopmode -halt-on-error -usepretex=\\def\\cvvariant{academic} -jobname=academic"

      - name: Prepare data artifact
        run: |
          mkdir -p dist
          cp academic.pdf dist/academic.pdf
          zip -r dist/cv-data.zip data own-bib.bib photo_jason_1.jpeg

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cv-${{ github.sha }}
          path: |
            dist/academic.pdf
            dist/cv-data.zip
          retention-days: 30

      - name: Update "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest CV build"
          body: "Automated build from ${{ github.sha }}."
          files: |
            dist/academic.pdf
            dist/cv-data.zip
          make_latest: "true"
          prerelease: false

      # Cross-repo trigger to the website repo. Disabled until a PAT and the
      # target repo exist (M2 sets this up). Set the secret WEBSITE_DISPATCH_PAT
      # to a PAT with "repo" scope on the website repo to enable.
      - name: Notify website repo
        if: env.WEBSITE_DISPATCH_ENABLED == 'true'
        env:
          WEBSITE_DISPATCH_ENABLED: ${{ secrets.WEBSITE_DISPATCH_PAT != '' && 'true' || 'false' }}
          PAT: ${{ secrets.WEBSITE_DISPATCH_PAT }}
          WEBSITE_REPO: ${{ vars.WEBSITE_REPO }}   # e.g. "djjay0131/website"
        run: |
          curl -sSf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${WEBSITE_REPO}/dispatches" \
            -d '{"event_type":"cv-updated","client_payload":{"sha":"${{ github.sha }}"}}'
