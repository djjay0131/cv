- id: research-professional
  text: >-
    Computer Science PhD candidate and applied researcher who bridges large-scale
    software engineering with empirical AI/ML research. Two decades architecting
    Azure data platforms and SaaS systems now grounds research that is reproducible,
    deployable, and measured against real workloads, spanning LLM-assisted software
    engineering, security classification, and mechanistic interpretability.
    Published at ICSE 2026, with hands-on depth in ML pipelines, evaluation design,
    and the engineering rigor that industry R&D depends on.
