- id: academic
  text: >-
    Results-oriented technical executive and principal engineer with deep experience
    leading platform architecture, data integration, and SaaS operations.
    Specialized in Azure (Data Factory, Storage, Key Vault), large-scale ETL/ELT
    pipelines, automation, and end-to-end delivery. Proven record building teams,
